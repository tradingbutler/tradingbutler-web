server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /rates.json {
        alias /usr/share/nginx/html/data/rates.json;
    }

    location = /brokers.json {
        alias /usr/share/nginx/html/data/brokers.json;
    }
}
