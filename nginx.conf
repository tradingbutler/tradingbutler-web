server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-compressed .gz sidecars when present (build-time for JS/CSS,
    # written each cycle by json-writer for rates.json/brokers.json); falls
    # back to on-the-fly gzip below for anything without one.
    gzip_static on;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /rates.json {
        alias /usr/share/nginx/html/data/rates.json;
    }

    location = /brokers.json {
        alias /usr/share/nginx/html/data/brokers.json;
    }
}
